{% extends 'tasks/base.html' %}

{% block content %}
<div class="login-page-wrapper d-flex justify-content-center align-items-center">
    <div class="login-card animate-view shadow-lg">
        <div class="login-card-body p-5">
            <div class="text-center mb-5">
                <div class="login-logo mb-3">
                </div>
                <h2 class="fw-bold tracking-tight">Welcome Back</h2>
                <p class="text-muted small">Access your Hangarin</p>
            </div>

            <form method="post" class="login-form">
                {% csrf_token %}
                
                <div class="form-floating mb-3">
                    <input type="text" name="username" class="form-control rounded-4 border-0 bg-light px-4" id="id_username" placeholder="Username" required>
                    <label for="id_username" class="text-muted px-4">Username</label>
                </div>

                <div class="form-floating mb-4">
                    <input type="password" name="password" class="form-control rounded-4 border-0 bg-light px-4" id="id_password" placeholder="Password" required>
                    <label for="id_password" class="text-muted px-4">Password</label>
                </div>

                <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold text-white shadow">
    Sign In
</button>
            </form>

            <div class="mt-5 text-center">
                <div class="d-flex justify-content-center gap-3 mt-3">
                    <div class="status-dot"></div>
                    <span class="ultra-small text-uppercase fw-bold tracking-widest text-secondary">System Online</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
