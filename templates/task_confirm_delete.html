{% extends 'base.html' %}

{% block content %}
<div class="container animate-view py-5 d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card border-0 shadow-sm rounded-4 p-5 text-center bg-white" style="max-width: 500px;">
        <div class="position-absolute top-0 start-0 w-100" style="height: 6px; background: #dc3545;"></div>
        
        <div class="mb-4">
            <div class="display-1 text-danger-subtle mb-3">
                <i class="fas fa-exclamation-circle"></i>
            </div>
            <h2 class="fw-bold text-dark mb-2">Are you sure?</h2>
            <p class="text-muted">
                You are about to permanently delete <br>
                <strong class="text-dark">"{{ object.title }}"</strong>.
            </p>
        </div>

        <div class="alert alert-warning border-0 rounded-4 small mb-4 py-3">
            <i class="fas fa-info-circle me-2"></i> This action cannot be undone.
        </div>

        <form method="post" class="mt-4">
            {% csrf_token %}
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-danger rounded-pill py-3 fw-bold shadow-sm">
                    Confirm Delete
                </button>
                <a href="{% url 'task_detail' object.pk %}" class="btn btn-light rounded-pill py-2 text-muted border-0">
                    No, keep it
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
