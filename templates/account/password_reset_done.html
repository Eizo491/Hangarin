{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-container-static text-center">
        <div class="mb-4">
            <i class="fas fa-paper-plane text-white opacity-50" style="font-size: 3rem;"></i>
        </div>
        <h2 class="fw-bold text-white mb-3">Check Your Email</h2>
        <p class="text-white-50 mb-4">We have sent you an email. If an account exists with that address, you will receive instructions on how to reset your password shortly.</p>
        
        <a href="{% url 'account_login' %}" class="btn btn-white-solid w-100 rounded-pill fw-bold py-3">
            RETURN TO LOGIN
        </a>
    </div>
</div>
{% endblock %}
